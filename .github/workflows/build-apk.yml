name: Build Flet Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch: # 支持手动Run按钮

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 统一配置JDK17
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 一键安装完整Android SDK+cmdline-tools，规避谷歌链接404
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools: latest
          platform-versions: 34
          build-tools-versions: 34.0.0
          accept-licenses: true

      # 配置Python
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 安装项目依赖
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.24.1 requests

      # Flutter锁定3.19.0，满足Flet0.24.1最低要求
      - name: Setup Flutter 3.19.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.0"
          channel: stable
          cache: true

      # 构建APK（正确命令，无--debug参数）
      - name: Build APK
        run: flet build apk

      # 上传APK产物
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flet-app-apk
          path: build/apk/app-debug.apk
          retention-days: 30
