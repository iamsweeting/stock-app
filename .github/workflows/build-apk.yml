name: Build Flet Android APK
on:
  # push:
  #   branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 修正Android SDK Action合法参数
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: latest
          accept-android-sdk-licenses: true
          packages: >
            platforms;android-34
            build-tools;34.0.0
            platform-tools

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装Python依赖
        run: |
          python -m pip install --upgrade pip
          pip install flet requests

      - name: 清理旧缓存
        run: rm -rf build .flet flutter

      # 自动输入y跳过交互确认
      - name: 编译APK
        run: echo y | flet build apk

      # 上传整个apk文件夹，避免单文件找不到
      - name: 上传APK安装包
        uses: actions/upload-artifact@v4
        with:
          name: stock-app-apk
          path: build/apk/
          retention-days: 30
