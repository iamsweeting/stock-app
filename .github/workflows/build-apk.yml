name: Build Flet Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools: latest
          platform-versions: 34
          build-tools-versions: 34.0.0
          accept-licenses: true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装Python依赖
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.24.1 requests

      # 升级Flutter至3.22.0，内置Dart3.4，解决版本冲突
      - name: Setup Flutter 3.22.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: stable
          cache: true

      - name: 构建APK
        run: flet build apk

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: flet-app-apk
          path: build/apk/app-debug.apk
          retention-days: 30
