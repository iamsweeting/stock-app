name: Build Flet Android APK
on:
  # push:
  #   branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置JDK17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools: latest
          platform-versions: 34
          build-tools-versions: "34.0.0"
          accept-licenses: true

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 同时安装flet（提供命令行）+ 项目依赖requests，不锁死版本避免overridden冲突
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install flet requests

      # Flutter 3.22.0 适配Dart3.4
      - name: 安装 Flutter 3.22.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: stable
          cache: true

      # 清理旧缓存
      - name: 清理旧打包缓存
        run: |
          rm -rf build .flet flutter

      # 编译APK
      - name: 编译APK
        run: flet build apk

      - name: 上传APK包
        uses: actions/upload-artifact@v4
        with:
          name: stock-app-apk
          path: build/apk/app-debug.apk
          retention-days: 30
